<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive India Flag</title>

  <style>
    /* ---- Page layout (centered) ---- */
    html, body {
      margin: 0;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background:#f0f0f0;
    }

    /* ---- Flag ---- */
    .flag {
      width: 90vw;
      max-width: 500px;
      aspect-ratio: 5 / 3;
      display: flex;
      flex-direction: column;
      border: 2px solid #000;
      box-shadow: 0 4px 8px rgba(0,0,0,.3);
      position: relative;
    }

    .stripe { flex: 1; }

    .saffron { background: #FF9933; }
    .white   { background: #fff; position: relative; }
    .green   { background: #138808; }

    canvas {
      position: absolute;
      width: 18%;
      height: auto;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* ---- Desktop size ---- */
    @media (min-width: 768px) {
      .flag {
        width: 300px;
        height: 180px;
        aspect-ratio: auto;
      }
    }
  </style>
</head>

<body>
  <div class="flag">
    <div class="stripe saffron"></div>
    <div class="stripe white">
      <canvas id="chakra"></canvas>
    </div>
    <div class="stripe green"></div>
  </div>

  <script>
    const canvas = document.getElementById("chakra");
    const ctx = canvas.getContext("2d");

    function drawChakra() {
      const size = canvas.offsetWidth;
      canvas.width = size;
      canvas.height = size;

      const center = size / 2;
      const radius = size * 0.4;

      ctx.clearRect(0, 0, size, size);

      // outer circle
      ctx.strokeStyle = "#000080";
      ctx.lineWidth = size * 0.03;
      ctx.beginPath();
      ctx.arc(center, center, radius, 0, Math.PI * 2);
      ctx.stroke();

      // 24 spokes
      for (let i = 0; i < 24; i++) {
        let angle = (i * 2 * Math.PI) / 24;
        let x = center + radius * Math.cos(angle);
        let y = center + radius * Math.sin(angle);

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.lineTo(x, y);
        ctx.stroke();
      }
    }

    window.addEventListener("load", drawChakra);
    window.addEventListener("resize", drawChakra);
  </script>
</body>
</html>
